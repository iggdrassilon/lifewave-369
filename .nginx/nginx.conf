server {
  server_name patch-stem-cells.ru;

  access_log /var/log/nginx/cell_access.log;
  error_log /var/log/nginx/cell_error.log;

  root /var/www/cell;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html =404;
  }

  location ~* "\.(svg|jpg|jpeg|png|gif|ico|css|js|pdf|mp4|woff|woff2|ttf|otf)$" {
    try_files $uri @proxy;
  }

  location ~* "/(assets|content|fonts|icons|images|pdf|video|)/$" {
    internal;
  }

  location @proxy {
    proxy_pass http://localhost:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/patch-stem-cells.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/patch-stem-cells.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = patch-stem-cells.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  listen 80;
  server_name patch-stem-cells.ru;
    return 404; # managed by Certbot


}
